<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life in Days Widget</title>
  <style>
    /* 1. 기본 노션 UI 설정 (여백 및 테두리 제거, 라이트/다크 완벽 대응) */
    body {
      font-family: "Segoe UI", "Helvetica Neue", -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 0;
      background-color: #FFFFFF;
      color: #37352f;
      transition: background-color 0.3s ease, color 0.3s ease;
      overflow: hidden;
      position: relative; /* 톱니바퀴 아이콘 배치를 위한 기준점 */
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #191919;
        color: rgba(255, 255, 255, 0.81);
      }
    }

    /* 2. 톱니바퀴(설정) 아이콘 디자인 */
    .settings-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      cursor: pointer;
      opacity: 0; /* 평소에는 숨김 (초미니멀리즘) */
      font-size: 1.2rem;
      transition: opacity 0.2s ease;
      filter: grayscale(100%);
    }

    /* 마우스를 위젯 근처로 가져가면 아이콘이 스르륵 나타남 */
    body:hover .settings-btn {
      opacity: 0.3;
    }
    .settings-btn:hover {
      opacity: 0.8 !important;
    }

    /* 3. 메인 위젯 레이아웃 */
    .widget-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .label-top {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      opacity: 0.5;
      margin-bottom: 6px;
    }

    .number {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1.1;
      /* 대시보드의 차분한 톤에 맞춘 딥 블루 */
      color: #0F7B9F; 
    }

    @media (prefers-color-scheme: dark) {
      .number {
        color: #5E87C9; 
      }
    }

    .label-bottom {
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.6;
      margin-top: 4px;
    }

    /* 4. 설정 모달창 (노션 순정 팝업 스타일 이식) */
    .modal {
      display: none; /* 평소에는 숨김 */
      flex-direction: column;
      background-color: #FFFFFF;
      border: 1px solid rgba(15, 15, 15, 0.1);
      box-shadow: rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.1) 0px 3px 6px, rgba(15, 15, 15, 0.2) 0px 9px 24px;
      border-radius: 6px;
      padding: 20px;
      position: absolute;
      z-index: 10;
    }

    @media (prefers-color-scheme: dark) {
      .modal {
        background-color: #252525;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    }

    .modal label {
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .modal input[type="date"] {
      font-family: inherit;
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid rgba(15, 15, 15, 0.2);
      background: transparent;
      color: inherit;
      margin-bottom: 15px;
      outline: none;
    }
    
    @media (prefers-color-scheme: dark) {
      .modal input[type="date"] {
        border: 1px solid rgba(255, 255, 255, 0.2);
        /* 다크모드에서 달력 아이콘이 잘 보이도록 처리 */
        color-scheme: dark;
      }
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      padding: 6px 12px;
      font-size: 0.85rem;
      border-radius: 4px;
      cursor: pointer;
      border: none;
      font-weight: 500;
    }

    /* 노션 스타일 파란색 저장 버튼 */
    .btn-save {
      background-color: #2eaadc;
      color: white;
    }
    .btn-save:hover { background-color: #069cda; }

    /* 취소 버튼 */
    .btn-cancel {
      background-color: transparent;
      color: inherit;
      opacity: 0.7;
    }
    .btn-cancel:hover { opacity: 1; background-color: rgba(15, 15, 15, 0.05); }
    @media (prefers-color-scheme: dark) {
      .btn-cancel:hover { background-color: rgba(255, 255, 255, 0.05); }
    }
  </style>
</head>
<body>

  <div class="settings-btn" id="settingsBtn" title="생년월일 설정">⚙️</div>

  <div class="widget-container" id="widgetContent">
    <div class="label-top">Life in Days</div>
    <div class="number" id="daysLived">0</div>
    <div class="label-bottom">일 째</div>
  </div>

  <div class="modal" id="settingsModal">
    <label>생년월일을 입력해주세요</label>
    <input type="date" id="birthDateInput">
    <div class="modal-buttons">
      <button class="btn btn-cancel" id="cancelBtn">취소</button>
      <button class="btn btn-save" id="saveBtn">저장</button>
    </div>
  </div>

  <script>
    // HTML 요소 가져오기
    const daysLivedEl = document.getElementById('daysLived');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const widgetContent = document.getElementById('widgetContent');
    const birthDateInput = document.getElementById('birthDateInput');
    const saveBtn = document.getElementById('saveBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    // 💡 날짜 계산 및 화면 업데이트 함수
    function updateDisplay() {
      // 로컬 스토리지에서 저장된 생일을 가져오고, 없으면 기본값(1990-01-01) 사용
      const savedDate = localStorage.getItem('userBirthDate') || '1990-01-01';
      const birthDate = new Date(savedDate);
      const today = new Date();
      
      const diffTime = today - birthDate;
      const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      
      // 천 단위 콤마 찍어서 숫자 입력
      daysLivedEl.innerText = diffDays.toLocaleString();
    }

    // 톱니바퀴 클릭 시: 모달창 띄우기
    settingsBtn.addEventListener('click', () => {
      // 현재 저장된 날짜를 입력창에 기본 세팅
      birthDateInput.value = localStorage.getItem('userBirthDate') || '1990-01-01';
      widgetContent.style.display = 'none';
      settingsModal.style.display = 'flex';
    });

    // 저장 버튼 클릭 시: 날짜 저장 및 화면 갱신
    saveBtn.addEventListener('click', () => {
      if(birthDateInput.value) {
        localStorage.setItem('userBirthDate', birthDateInput.value);
      }
      settingsModal.style.display = 'none';
      widgetContent.style.display = 'flex';
      updateDisplay();
    });

    // 취소 버튼 클릭 시: 모달창 닫기
    cancelBtn.addEventListener('click', () => {
      settingsModal.style.display = 'none';
      widgetContent.style.display = 'flex';
    });

    // 페이지가 처음 로드될 때 한 번 실행
    updateDisplay();
  </script>

</body>
</html>
