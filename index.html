<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life & Year Progress Widget</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v3.2.1/dist/web/static/pretendard.css" />
  <style>
    :root { font-size: min(4.5vw, 7vh); }
    body {
      font-family: 'Pretendard', sans-serif; font-weight: 700; display: flex; justify-content: flex-start;
      align-items: center; height: 100vh; margin: 0; padding: 0 6%; background-color: #FFFFFF;
      color: #37352f; transition: background-color 0.3s ease, color 0.3s ease; overflow: hidden; position: relative; box-sizing: border-box;
    }
    @media (prefers-color-scheme: dark) { body { background-color: #191919; color: rgba(255, 255, 255, 0.9); } }

 
    .settings-btn { 
      position: absolute; top: 10px; left: 10px; cursor: pointer; 
      opacity: 0.3;
      font-size: 18px; transition: opacity 0.2s ease; filter: grayscale(100%); 
    }
    .settings-btn:hover { opacity: 0.8 !important; }

    .widget-container { width: 100%; display: flex; flex-direction: column; gap: 0.8rem; }
    .date-header { font-size: 2.2rem; letter-spacing: -0.05rem; color: #37352f; }
    @media (prefers-color-scheme: dark) { .date-header { color: rgba(255, 255, 255, 0.9); } }

    .days-text { font-size: 1.4rem; display: flex; align-items: baseline; gap: 0.3rem; color: #37352f; }
    @media (prefers-color-scheme: dark) { .days-text { color: rgba(255, 255, 255, 0.9); } }
    .triangle { font-size: 1.2rem; color: inherit; }
    .number { color: #37352f; font-size: 1.6rem; }
    @media (prefers-color-scheme: dark) { .number { color: rgba(255, 255, 255, 0.9); } }

    .progress-wrapper { margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.3rem; }
    .progress-header { display: flex; justify-content: space-between; font-size: 0.85rem; }
    .progress-track { width: 100%; height: 0.85rem; background-color: #e1e1e1; border-radius: 1rem; overflow: hidden; }
    @media (prefers-color-scheme: dark) { .progress-track { background-color: #333333; } }
    .progress-fill { height: 100%; background-color: #37352f; border-radius: 1rem; transition: width 0.8s ease-out; }
    @media (prefers-color-scheme: dark) { .progress-fill { background-color: rgba(255, 255, 255, 0.9); } }
    .progress-footer { text-align: right; font-size: 0.75rem; color: #787774; }
    @media (prefers-color-scheme: dark) { .progress-footer { color: rgba(255, 255, 255, 0.5); } }

    .modal { display: none; flex-direction: column; background-color: #FFFFFF; border: 1px solid rgba(15, 15, 15, 0.1); box-shadow: rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.2) 0px 9px 24px; border-radius: 6px; padding: 20px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; width: 260px; }
    @media (prefers-color-scheme: dark) { .modal { background-color: #252525; border: 1px solid rgba(255, 255, 255, 0.1); } }
    .modal label { font-size: 13px; margin-bottom: 10px; font-weight: 500; }
    .modal input[type="date"] { font-family: inherit; font-weight: 700; padding: 6px 10px; border-radius: 4px; font-size: 14px; border: 1px solid rgba(15, 15, 15, 0.2); background: transparent; color: inherit; margin-bottom: 15px; outline: none; }
    @media (prefers-color-scheme: dark) { .modal input[type="date"] { border: 1px solid rgba(255, 255, 255, 0.2); color-scheme: dark; } }
    .modal-buttons { display: flex; justify-content: flex-end; gap: 8px; }
    .btn { padding: 6px 12px; font-size: 13px; border-radius: 4px; cursor: pointer; border: none; font-weight: 700; font-family: inherit; }
    .btn-save { background-color: #2eaadc; color: white; }
    .btn-save:hover { background-color: #069cda; }
    .btn-cancel { background-color: transparent; color: inherit; opacity: 0.7; }
    .btn-cancel:hover { opacity: 1; background-color: rgba(15, 15, 15, 0.05); }
    @media (prefers-color-scheme: dark) { .btn-cancel:hover { background-color: rgba(255, 255, 255, 0.05); } }
  </style>
</head>
<body>

  <div class="settings-btn" id="settingsBtn" title="생년월일 설정">⚙️</div>

  <div class="widget-container" id="widgetContent">
    <div class="date-header" id="currentDate">Loading...</div>
    
    <div class="days-text">
      <span class="triangle">▸</span>
      <span class="number" id="daysLived">0</span>일 째 열심히 살아가는 중
    </div>

    <div class="progress-wrapper">
      <div class="progress-header">
        <span id="currentYear"></span>
        <span id="progressPercent">0.0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
      </div>
      <div class="progress-footer" id="progressDays"></div>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <label>생년월일을 입력해주세요</label>
    <input type="date" id="birthDateInput">
    <div class="modal-buttons">
      <button class="btn btn-cancel" id="cancelBtn">취소</button>
      <button class="btn btn-save" id="saveBtn">저장</button>
    </div>
  </div>

  <script>
    const daysLivedEl = document.getElementById('daysLived');
    const currentDateEl = document.getElementById('currentDate');
    const currentYearEl = document.getElementById('currentYear');
    const progressPercentEl = document.getElementById('progressPercent');
    const progressFillEl = document.getElementById('progressFill');
    const progressDaysEl = document.getElementById('progressDays');
    
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const widgetContent = document.getElementById('widgetContent');
    const birthDateInput = document.getElementById('birthDateInput');
    const saveBtn = document.getElementById('saveBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function getSafeBirthDate() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('dob')) return urlParams.get('dob');
        return window.localStorage.getItem('userBirthDate') || '1990-01-01';
      } catch (e) { return '1990-01-01'; }
    }

    function updateDisplay() {
      try {
        const today = new Date();
        const monthStr = monthNames[today.getMonth()];
        currentDateEl.innerText = `${monthStr} ${today.getDate()} ${today.getFullYear()}`;

        const savedDate = getSafeBirthDate();
        const birthDate = new Date(savedDate);
        const diffTime = today.getTime() - birthDate.getTime();
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        daysLivedEl.innerText = diffDays.toLocaleString();

        const year = today.getFullYear();
        const isLeapYear = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
        const daysInYear = isLeapYear ? 366 : 365;
        const startOfYear = new Date(year, 0, 1);
        const dayOfYear = Math.floor((today - startOfYear) / (1000 * 60 * 60 * 24)) + 1;
        const percent = ((dayOfYear / daysInYear) * 100).toFixed(1);

        currentYearEl.innerText = year;
        progressPercentEl.innerText = `${percent}%`;
        setTimeout(() => { progressFillEl.style.width = `${percent}%`; }, 100);
        progressDaysEl.innerText = `${dayOfYear}/${daysInYear} days`;
      } catch (error) { currentDateEl.innerText = "Error"; }
    }

    settingsBtn.addEventListener('click', () => {
      birthDateInput.value = getSafeBirthDate();
      widgetContent.style.opacity = '0.1';
      settingsModal.style.display = 'flex';
    });

    saveBtn.addEventListener('click', () => {
      if(birthDateInput.value) {
        try { window.localStorage.setItem('userBirthDate', birthDateInput.value); } catch(e) {}
      }
      settingsModal.style.display = 'none';
      widgetContent.style.opacity = '1';
      updateDisplay();
    });

    cancelBtn.addEventListener('click', () => {
      settingsModal.style.display = 'none';
      widgetContent.style.opacity = '1';
    });

    updateDisplay();
  </script>
</body>
</html>
