<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life & Year Progress Widget</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v3.2.1/dist/web/static/pretendard.css" />
  <style>
    /* 1. 반응형 폰트의 핵심 기준점 (루트 사이즈 설정) */
    :root {
      /* 가로(vw)와 세로(vh) 중 더 작은 값을 기준으로 폰트 크기를 유연하게 결정 */
      font-size: min(4.5vw, 7vh); 
    }

    /* 2. 기본 노션 UI 설정 (라이트/다크 대응 및 프리텐다드 Bold) */
    body {
      font-family: 'Pretendard', sans-serif;
      font-weight: 700;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      height: 100vh;
      margin: 0;
      /* 화면 크기에 비례하여 여백도 자동으로 줄어들고 늘어남 */
      padding: 0 6%; 
      background-color: #FFFFFF;
      color: #37352f;
      transition: background-color 0.3s ease, color 0.3s ease;
      overflow: hidden;
      position: relative;
      box-sizing: border-box;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #191919;
        color: rgba(255, 255, 255, 0.9);
      }
    }

    /* 3. 톱니바퀴 설정 아이콘 (UI 컨트롤은 고정 크기 유지) */
    .settings-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      cursor: pointer;
      opacity: 0;
      font-size: 20px;
      transition: opacity 0.2s ease;
      filter: grayscale(100%);
    }

    body:hover .settings-btn { opacity: 0.3; }
    .settings-btn:hover { opacity: 0.8 !important; }

    /* 4. 메인 위젯 레이아웃 (rem 단위 적용으로 전체 자동 스케일링) */
    .widget-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.8rem; /* 요소 간격도 화면에 비례하여 늘어남 */
    }

    .date-header {
      font-size: 2.2rem;
      letter-spacing: -0.05rem;
      color: #37352f;
    }
    
    @media (prefers-color-scheme: dark) {
      .date-header { color: rgba(255, 255, 255, 0.9); }
    }

    .days-text {
      font-size: 1.4rem;
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
      color: #37352f;
    }

    @media (prefers-color-scheme: dark) {
      .days-text { color: rgba(255, 255, 255, 0.9); }
    }

    .triangle {
      font-size: 1.2rem;
      color: inherit;
    }

    .number {
      color: #37352f; 
      font-size: 1.6rem;
    }

    @media (prefers-color-scheme: dark) {
      .number { color: rgba(255, 255, 255, 0.9); }
    }

  
    .progress-wrapper {
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
    }
