<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v3.2.1/dist/web/static/pretendard.css" />
  <style>
    body { font-family: 'Pretendard', sans-serif; font-weight: 700; background: #FFFFFF; color: #37352f; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    @media (prefers-color-scheme: dark) { body { background: #191919; color: #fff; } }
    .widget { width: 90%; max-width: 300px; }
    .date { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .days { font-size: 1.2rem; margin-bottom: 1rem; }
    .number { color: #37352f; }
    @media (prefers-color-scheme: dark) { .number { color: #fff; } }
    .track { width: 100%; height: 10px; background: #e1e1e1; border-radius: 5px; overflow: hidden; }
    .fill { height: 100%; background: #37352f; border-radius: 5px; width: 0%; transition: 1s; }
    @media (prefers-color-scheme: dark) { .track { background: #333; } .fill { background: #fff; } }
  </style>
</head>
<body>
  <div class="widget">
    <div class="date" id="date">Loading...</div>
    <div class="days">▸ <span class="number" id="days">0</span>일 째 살아가는 중</div>
    <div class="track"><div class="fill" id="fill"></div></div>
  </div>
  <script>
    const d = new Date();
    document.getElementById('date').innerText = d.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
    const birth = new Date('1990-01-01');
    document.getElementById('days').innerText = Math.floor((d - birth) / 86400000).toLocaleString();
    const start = new Date(d.getFullYear(), 0, 1);
    const progress = ((d - start) / 31536000000 * 100).toFixed(1);
    document.getElementById('fill').style.width = progress + '%';
  </script>
</body>
</html>
