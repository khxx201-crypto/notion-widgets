<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v3.2.1/dist/web/static/pretendard.css" />
  <style>
    :root { font-size: 16px; }
    body {
      font-family: 'Pretendard', sans-serif; font-weight: 700;
      background: #FFFFFF; color: #37352f;
      display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
    }
    @media (prefers-color-scheme: dark) { body { background: #191919; color: #fff; } }

    .widget { width: 100%; max-width: 400px; padding: 10px; box-sizing: border-box; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    
    /* 텍스트 삭제 및 월 표기 강조 */
    .month-label { font-size: 1.1rem; color: #37352f; text-transform: uppercase; }
    @media (prefers-color-scheme: dark) { .month-label { color: #fff; } }
    
    .score { font-size: 0.9rem; color: #2eaadc; }

    .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10%; }
    .dot-wrapper { width: 100%; aspect-ratio: 1 / 1; }
    .dot { width: 100%; height: 100%; border-radius: 50%; background: #e1e1e1; cursor: pointer; transition: 0.2s; }
    .dot.active { background: #37352f; }
    @media (prefers-color-scheme: dark) { 
      .dot { background: #333; } 
      .dot.active { background: #fff; }
    }
  </style>
</head>
<body>

<div class="widget">
  <div class="header">
    <div class="month-label" id="monthLabel">Month</div>
    <div class="score" id="score">0일 달성</div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
  const grid = document.getElementById('grid');
  const score = document.getElementById('score');
  const monthLabel = document.getElementById('monthLabel');
  const now = new Date();
  
  monthLabel.innerText = now.toLocaleDateString('en-US', { month: 'short' });
  
  const currentMonth = now.getMonth();
  const daysInMonth = new Date(now.getFullYear(), currentMonth + 1, 0).getDate();
  
  let data = JSON.parse(localStorage.getItem('zeroSpendingData') || '{"month": -1, "days": []}');
  if (data.month !== currentMonth) {
    data = { month: currentMonth, days: [] };
    localStorage.setItem('zeroSpendingData', JSON.stringify(data));
  }

  function render() {
    grid.innerHTML = '';
    let count = 0;
    for (let i = 1; i <= daysInMonth; i++) {
      const wrapper = document.createElement('div');
      wrapper.className = 'dot-wrapper';
      const dot = document.createElement('div');
      dot.className = 'dot' + (data.days.includes(i) ? ' active' : '');
      dot.onclick = () => {
        if (data.days.includes(i)) data.days = data.days.filter(d => d !== i);
        else data.days.push(i);
        localStorage.setItem('zeroSpendingData', JSON.stringify(data));
        render();
      };
      wrapper.appendChild(dot);
      grid.appendChild(wrapper);
      if (data.days.includes(i)) count++;
    }
    score.innerText = `${count}일 달성`;
  }
  render();
</script>
</body>
</html>
